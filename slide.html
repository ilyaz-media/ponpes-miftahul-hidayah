<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Website Slideshow</title>
    <link rel="stylesheet" href="slide.css" />
  </head>
  <body>
    <div class="slideshow-container">
      <!-- Slide 1 -->
      <div class="slide active">
        <img src="img/2.jpeg" alt="Nature 1" />
        <div class="slide-content">
          <h2>Selamat Datang</h2>
          <p>Temukan keindahan alam yang menakjubkan di sekitar kita</p>
          <a href="#" class="btn">Pelajari Lebih Lanjut</a>
        </div>
      </div>

      <!-- Slide 2 -->
      <div class="slide">
        <img src="img/3.jpeg" alt="Mountain" />
        <div class="slide-content">
          <h2>Petik Petualangan</h2>
          <p>Siap untuk menaklukkan puncak-puncak tertinggi?</p>
          <a href="#" class="btn">Mulai Sekarang</a>
        </div>
      </div>

      <!-- Slide 3 -->
      <div class="slide">
        <img src="img/3.jpeg" alt="Beach" />
        <div class="slide-content">
          <h2>Rileks di Pantai</h2>
          <p>Nikmati pasir putih dan ombak yang menenangkan</p>
          <a href="#" class="btn">Reservasi</a>
        </div>
      </div>

      <!-- Navigation Arrows -->
      <button class="prev" aria-label="Previous Slide">❮</button>
      <button class="next" aria-label="Next Slide">❯</button>
    </div>

    <!-- Dots Indicators -->
    <div class="dots-container">
      <span class="dot active" data-slide="1"></span>
      <span class="dot" data-slide="2"></span>
      <span class="dot" data-slide="3"></span>
    </div>

    <script src="slide.js"></script>
  </body>
</html>
